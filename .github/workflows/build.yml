name: Build

on:
  workflow_dispatch: 


jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:


          - os: windows-2022
            qt_version: 5.15.2
            qt_host: windows
            qt_arch: win32_mingw81



    runs-on: ${{ matrix.os }}

    env:
      
      INSTALL_DIR: "install"
      BUILD_DIR: "build"

    steps:
      - name: Install 32bit mingw on Windows
        if: runner.os == 'Windows'
        uses: egor-tensin/setup-mingw@v2
        with:
          platform: x86


      - name: Verify MinGW Installation
        run: |
          echo "PATH=$PATH"
          where cc || true
          cc --version || true


      - name: Install 32bit zlib via Strawberry on Windows
        if: runner.os == 'Windows'
        run: |
          choco install strawberryperl -y --force --x86

      - name: Checkout
        uses: actions/checkout@v2
        with:
          submodules: "true"

      # We need to do this here because it inexplicably fails if we split the step
      - name: Install OpenSSL via Choco
        shell: pwsh
        run: choco install openssl -y



      - name: Set short version
        shell: bash
        run: |
          ver_short=`git rev-parse --short HEAD`
          echo "VERSION=$ver_short" >> $GITHUB_ENV

      - name: Install OpenJDK
        uses: AdoptOpenJDK/install-jdk@v1
        with:
          version: "17"



      - name: Install Qt
        if: runner.os != 'Linux' 
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ matrix.qt_version }}
          host: ${{ matrix.qt_host }}
          arch: ${{ matrix.qt_arch }}
          dir: "${{ github.workspace }}/Qt/"



      - name: Install Ninja
        uses: urkle/action-get-ninja@v1





      - name: Configure CMake
        if: runner.os != 'Linux'
        run: |
          cmake -S . -B ${{ env.BUILD_DIR }} -DCMAKE_INSTALL_PREFIX=${{ env.INSTALL_DIR }} -DCMAKE_BUILD_TYPE=Release -G Ninja


      - name: Build
        run: |
          cmake --build ${{ env.BUILD_DIR }}

      - name: Install
        if: runner.os != 'Linux'
        run: |
          cmake --install ${{ env.BUILD_DIR }}



      - name: Run windeployqt
        if: runner.os == 'Windows'
        run: |
          windeployqt --no-translations --no-system-d3d-compiler --no-opengl-sw "${{ env.INSTALL_DIR }}/polymc.exe"







      - name: Upload package for Windows
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: PolyMC-${{ runner.os }}-Release
          path: ${{ env.INSTALL_DIR }}/**


